    <!-- Critical inline CSS — paints instantly, no blank flash -->
    <style>
      html, body {
        margin: 0; padding: 0;
        background: #0B0F1F;
        color: #E5E7EB;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'DM Sans', system-ui, sans-serif;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }
      .a12-boot {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 22px; background: #0B0F1F; z-index: 9999;
        transition: opacity 0.35s ease-out;
      }
      .a12-boot-logo {
        width: 62px; height: 62px; border-radius: 16px;
        background: linear-gradient(135deg, #8B5CF6, #EC4899, #06B6D4);
        display: flex; align-items: center; justify-content: center;
        font-size: 30px; box-shadow: 0 8px 40px rgba(139, 92, 246, 0.5);
      }
      .a12-boot-title { font-weight: 800; font-size: 20px; color: #E5E7EB; letter-spacing: 0.2px; }
      .a12-boot-title em { font-style: normal; background: linear-gradient(90deg, #C4B5FD, #F0ABFC); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
      .a12-boot-bar {
        width: 200px; height: 3px; border-radius: 3px; overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }
      .a12-boot-bar::after {
        content: ''; display: block; width: 40%; height: 100%;
        background: linear-gradient(90deg, #8B5CF6, #EC4899);
        animation: a12boot 1.1s ease-in-out infinite;
      }
      @keyframes a12boot {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="a12-boot" id="a12Boot">
        <div class="a12-boot-logo">🎓</div>
        <div class="a12-boot-title">After12th <em>AI</em></div>
        <div class="a12-boot-bar"></div>
      </div>
    </div>
    <script>
      // Fade out the boot screen once React mounts.
      const obs = new MutationObserver(() => {
        const boot = document.getElementById('a12Boot');
        if (boot && document.querySelector('#root > :not(.a12-boot)')) {
          boot.style.opacity = '0';
          setTimeout(() => boot.remove(), 400);
          obs.disconnect();
        }
      });
      obs.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
